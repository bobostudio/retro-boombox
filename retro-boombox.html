<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETRO BOOMBOX · 复古卡座收音机的夜晚</title>
<style>
:root{
  --desk1:#3a2417; --desk2:#241408;
  --body1:#e8e0d0; --body2:#c9bfa8; --body3:#a89e86;
  --dark:#1c1a18; --metal:#8f8a80;
  --amber:#ffb347; --red:#ff3b30; --green:#7dff6a;
}
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{height:100%;overflow:hidden}
body{
  font-family:"Courier New",monospace;
  background:radial-gradient(1200px 700px at 50% -10%,#2b3550 0%,#141824 45%,#0a0c12 100%);
  display:flex;align-items:center;justify-content:center;
}
/* ---------- 场景 ---------- */
.room{position:relative;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center}
.lamp-glow{
  position:absolute;top:-15%;left:50%;transform:translateX(-50%);
  width:140vmin;height:90vmin;pointer-events:none;
  background:radial-gradient(closest-side,rgba(255,190,110,.16),rgba(255,190,110,.05) 55%,transparent 75%);
  animation:glowFlicker 7s ease-in-out infinite;
}
@keyframes glowFlicker{0%,100%{opacity:1}50%{opacity:.85}72%{opacity:.95}}
.desk{
  position:absolute;bottom:0;left:0;right:0;height:26vh;
  background:
    repeating-linear-gradient(90deg,rgba(0,0,0,.12) 0 2px,transparent 2px 140px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0 1px,transparent 1px 9px),
    linear-gradient(180deg,var(--desk1),var(--desk2));
  box-shadow:inset 0 14px 30px rgba(0,0,0,.55);
}
.desk::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(180deg,rgba(255,210,150,.18),transparent);}
.stage{position:relative;z-index:2;display:flex;align-items:flex-end;gap:5vmin;
  padding-bottom:calc(26vh - 2vmin);transform-origin:bottom center}
/* ---------- 音箱主体 ---------- */
.boombox{
  position:relative;width:78vmin;height:42vmin;min-width:620px;min-height:340px;
  border-radius:2.2vmin;
  background:linear-gradient(180deg,var(--body1),var(--body2) 60%,var(--body3));
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.7),
    inset 0 -8px 16px rgba(0,0,0,.25),
    0 3vmin 6vmin rgba(0,0,0,.65);
  display:flex;align-items:stretch;padding:2.4vmin 2.6vmin;gap:2.4vmin;
}
.boombox::before{ /* 提手 */
  content:"";position:absolute;top:-3.4vmin;left:12%;right:12%;height:3.6vmin;
  border:1.1vmin solid #b3a991;border-bottom:none;border-radius:2vmin 2vmin 0 0;
  box-shadow:inset 0 2px 2px rgba(255,255,255,.5);
}
.brand{
  position:absolute;top:1vmin;left:50%;transform:translateX(-50%);z-index:2;
  font-weight:bold;letter-spacing:.3em;font-size:1.4vmin;color:#6b6252;white-space:nowrap;
  text-shadow:0 1px 0 rgba(255,255,255,.6);pointer-events:none;
}
/* 喇叭 */
.speaker{
  position:relative;flex:0 0 24%;border-radius:1.4vmin;
  background:radial-gradient(circle at 50% 55%,#2a2724 0%,#171513 70%);
  box-shadow:inset 0 0 0 .5vmin #4c463e,inset 0 0 3vmin #000,0 1px 0 rgba(255,255,255,.5);
  overflow:hidden;
}
.speaker::before{
  content:"";position:absolute;inset:12%;
  background:
    repeating-radial-gradient(circle at 50% 55%,#0c0b0a 0 .7vmin,#252220 .7vmin .85vmin);
  border-radius:50%;
  transition:transform .1s;
}
.speaker::after{
  content:"";position:absolute;inset:34%;
  background:radial-gradient(circle,#3d3833,#100f0e 70%);border-radius:50%;
  box-shadow:0 0 0 .4vmin #0a0908;
}
.speaker.thump::before{animation:thump .18s ease-out}
@keyframes thump{0%{transform:scale(1)}30%{transform:scale(1.045)}100%{transform:scale(1)}}
/* 中部 */
.center{flex:1;min-width:0;display:flex;flex-direction:column;gap:1.4vmin}
/* 显示屏 */
.display{
  position:relative;height:5.4vmin;border-radius:.8vmin;
  background:linear-gradient(180deg,#120a04,#1d1006);
  box-shadow:inset 0 0 1.6vmin #000,inset 0 0 0 2px #000;
  display:flex;align-items:center;justify-content:space-between;padding:0 1.4vmin;
  color:var(--amber);font-size:2vmin;letter-spacing:.15em;
  text-shadow:0 0 8px rgba(255,179,71,.8),0 0 20px rgba(255,179,71,.4);
  overflow:hidden;
}
.display .scroll{white-space:nowrap;display:inline-block}
.display.playing .scroll{animation:marquee 9s linear infinite}
@keyframes marquee{0%{transform:translateX(14vmin)}100%{transform:translateX(-110%)}}
.display .clock{font-size:1.6vmin;opacity:.9}
.led{width:1vmin;height:1vmin;border-radius:50%;background:#3a0d0a;box-shadow:inset 0 0 2px #000}
.led.on{background:var(--red);box-shadow:0 0 8px var(--red),0 0 16px rgba(255,59,48,.6)}
/* 卡带仓 */
.deck{
  position:relative;flex:1;border-radius:1.2vmin;min-height:14vmin;
  background:linear-gradient(180deg,#26231f,#171512 70%);
  box-shadow:inset 0 0 0 .5vmin #0d0c0a,inset 0 1vmin 2vmin #000;
  overflow:hidden;
}
.deck-window{
  position:absolute;inset:12% 8%;border-radius:.8vmin;
  background:linear-gradient(160deg,rgba(120,160,190,.10),rgba(60,80,100,.05) 40%,rgba(0,0,0,.25));
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.8),inset 0 0 2vmin rgba(0,0,0,.7);
}
.deck-window::after{content:"";position:absolute;inset:0;border-radius:.8vmin;
  background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.09) 42%,transparent 55%);}
.slot{position:absolute;left:6%;right:6%;top:6%;height:10%;border-radius:1vmin;
  background:#050404;box-shadow:0 1px 0 rgba(255,255,255,.08)}
.deck-label{position:absolute;bottom:2%;left:0;right:0;text-align:center;
  font-size:1.2vmin;letter-spacing:.35em;color:#6e675c}
/* 卡带(通用) */
.tape{
  position:relative;width:16vmin;height:10.4vmin;min-width:150px;min-height:98px;
  border-radius:.7vmin;cursor:pointer;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;
}
.tape-shell{
  position:absolute;inset:0;border-radius:.7vmin;
  background:linear-gradient(180deg,var(--tc1),var(--tc2));
  box-shadow:inset 0 2px 0 rgba(255,255,255,.35),inset 0 -3px 6px rgba(0,0,0,.35),
    0 .6vmin 1.2vmin rgba(0,0,0,.5);
  overflow:hidden;
}
.tape-label{
  position:absolute;left:6%;right:6%;top:8%;height:56%;border-radius:.4vmin;
  background:linear-gradient(180deg,#f5efdd,#e8dfc6);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.tape-label .ttl{font-weight:bold;font-size:1.5vmin;letter-spacing:.12em;color:#333}
.tape-label .sub{font-size:1vmin;color:#8a7f68;letter-spacing:.25em}
.tape-label .stripe{position:absolute;left:0;right:0;top:0;height:26%;
  background:var(--tc3);border-radius:.4vmin .4vmin 0 0;opacity:.9}
.reel-win{
  position:absolute;left:50%;top:64%;transform:translateX(-50%);
  width:62%;height:26%;border-radius:.4vmin;
  background:linear-gradient(180deg,#141210,#1e1b17);
  box-shadow:inset 0 0 0 1px #000;
  display:flex;align-items:center;justify-content:space-between;padding:0 12%;
}
.reel{
  width:2.6vmin;height:2.6vmin;min-width:24px;min-height:24px;border-radius:50%;
  background:radial-gradient(circle,#d8d2c4 0 18%,#3a362f 20% 40%,#57524a 42% 55%,#2b2823 60%);
  position:relative;
}
.reel::before{content:"";position:absolute;inset:22%;
  background:conic-gradient(#111 0 12%,transparent 12% 33%,#111 33% 45%,transparent 45% 66%,#111 66% 78%,transparent 78%);
  border-radius:50%}
.playing .reel{animation:spin 1.1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tape-ribbon{flex:1;height:30%;margin:0 -2%;background:
  repeating-linear-gradient(90deg,#4a3320 0 3px,#3a2818 3px 6px);opacity:.85;border-radius:2px}
/* 磁带堆 */
.tape-stack{position:relative;display:flex;flex-direction:column;gap:1.6vmin;padding-bottom:1vmin}
.tape-stack .tape:nth-child(odd){transform:rotate(-2deg)}
.tape-stack .tape:nth-child(even){transform:rotate(1.6deg) translateX(1.2vmin)}
.tape-stack .tape:hover{transform:rotate(0) translateY(-1vmin) scale(1.05);z-index:5;
  box-shadow:0 1.4vmin 2.4vmin rgba(0,0,0,.6)}
.tape-stack .tape:hover .tape-shell{box-shadow:inset 0 2px 0 rgba(255,255,255,.4),
  inset 0 -3px 6px rgba(0,0,0,.3),0 1.4vmin 2.6vmin rgba(0,0,0,.65)}
/* 仓内磁带 */
#deckTape{position:absolute;left:50%;top:50%;width:15vmin;height:9.6vmin;
  transform:translate(-50%,-50%) scale(.98);cursor:pointer;z-index:3}
/* 控制区 */
.controls{display:flex;align-items:center;gap:1.2vmin;padding:0 .4vmin;min-width:0}
.btn{
  position:relative;height:4.6vmin;min-height:40px;flex:1 1 0;min-width:0;padding:0 .5vmin;border:none;border-radius:.7vmin;cursor:pointer;
  font-family:inherit;font-size:1.6vmin;letter-spacing:.05em;color:#e9e2d2;white-space:nowrap;overflow:hidden;
  background:linear-gradient(180deg,#4b463f,#2e2a26 55%,#211e1b);
  box-shadow:0 .5vmin 0 #121010,0 .8vmin 1.2vmin rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .06s,box-shadow .06s;
}
.btn:active,.btn.pressed{transform:translateY(.4vmin);
  box-shadow:0 .1vmin 0 #121010,0 .3vmin .6vmin rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2)}
.btn.eject{color:#ffb0a8}
.btn:disabled{opacity:.35;cursor:not-allowed}
/* 音量旋钮 */
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:.3vmin;flex:0 0 auto}
.knob{
  width:5.2vmin;height:5.2vmin;min-width:46px;min-height:46px;border-radius:50%;cursor:ns-resize;
  background:
    radial-gradient(circle at 34% 30%,#6b655b,#3a362f 60%,#1b1916);
  box-shadow:0 .4vmin .9vmin rgba(0,0,0,.6),inset 0 2px 3px rgba(255,255,255,.25);
  position:relative;
}
.knob::after{content:"";position:absolute;left:50%;top:8%;width:.5vmin;height:34%;
  background:var(--amber);border-radius:1vmin;transform-origin:50% 118%;
  transform:translateX(-50%) rotate(var(--rot,-120deg));
  box-shadow:0 0 6px rgba(255,179,71,.7)}
.knob-wrap span{font-size:1vmin;color:#6e675c;letter-spacing:.2em}
/* VU 表 */
.vu{display:flex;align-items:flex-end;gap:3px;height:2.8vmin;margin:0 .4vmin}
.vu i{flex:1;height:8%;border-radius:2px;background:linear-gradient(180deg,#2c5b23,#224a1c);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);transition:height .07s}
.hint{position:absolute;left:50%;top:4vh;transform:translateX(-50%);
  color:#93a0c0;font-size:1.5vmin;letter-spacing:.3em;opacity:.75;z-index:3;white-space:nowrap;
  animation:hintPulse 3s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.75}50%{opacity:.35}}
.dust{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.dust i{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,220,170,.5);
  animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(20vh);opacity:0}12%{opacity:.7}
  88%{opacity:.4}100%{transform:translateY(-70vh) translateX(4vmin);opacity:0}}
/* 飞行动画 */
.fly{position:fixed;z-index:50;pointer-events:none;margin:0;
  transition:all .65s cubic-bezier(.5,-.15,.3,1.1)}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:40;
  background:radial-gradient(ellipse at 50% 45%,transparent 55%,rgba(0,0,0,.5) 100%)}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:41;opacity:.05;
  background:repeating-linear-gradient(0deg,#000 0 1px,transparent 1px 3px)}
</style>
</head>
<body>
<div class="room">
  <div class="lamp-glow"></div>
  <div class="dust" id="dust"></div>
  <div class="desk"></div>
  <div class="hint">点 击 旁 边 的 磁 带 · 插 入 卡 座 开 始 播 放</div>
  <div class="stage">
    <div class="boombox" id="boombox">
      <div class="brand">S O U N D W A V E &nbsp; S T - 8 0 8</div>
      <div class="speaker" id="spkL"></div>
      <div class="center">
        <div class="display" id="display">
          <span class="scroll" id="trackName">— NO TAPE —</span>
          <span class="clock" id="clock">0:00</span>
          <span class="led" id="led"></span>
        </div>
        <div class="deck" id="deck">
          <div class="slot"></div>
          <div class="deck-window"></div>
          <div id="deckTape" style="display:none"></div>
          <div class="deck-label">AUTO-STOP · DOLBY NR · METAL</div>
        </div>
        <div class="controls">
          <button class="btn" id="btnPlay" disabled>▶ PLAY</button>
          <button class="btn" id="btnStop" disabled>■ STOP</button>
          <button class="btn eject" id="btnEject" disabled>⏏ EJECT</button>
          <div class="knob-wrap">
            <div class="knob" id="knob" style="--rot:20deg"></div>
            <span>VOLUME</span>
          </div>
        </div>
        <div class="vu" id="vu"></div>
      </div>
      <div class="speaker" id="spkR"></div>
    </div>
    <div class="tape-stack" id="stack"></div>
  </div>
</div>
<div class="vignette"></div>
<div class="scanlines"></div>
<script>
"use strict";
/* ================= 磁带数据:每张带一首 8-bit 循环曲 ================= */
const N={C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,B5:987.8,_:0};
const TAPES=[
 {id:"city",title:"CITY POP '84",sub:"MIDNIGHT DRIVE",c:["#e2543e","#b03a2c","#f2a03d"],bpm:112,
  bass:["A3","_","A3","_","G3","_","E3","_","F3","_","F3","_","E3","_","D3","_"],
  lead:["E4","_","G4","A4","_","A4","_","G4","E4","_","D4","E4","_","_","_","_",
        "E4","_","G4","A4","_","C5","_","B4","A4","_","G4","E4","D4","_","_","_"]},
 {id:"neon",title:"NEON NOODLE",sub:"SYNTHWAVE NIGHT",c:["#7b4fd4","#56309e","#37c8e8"],bpm:96,
  bass:["C3","C3","_","C3","A3","_","G3","_","C3","C3","_","C3","B3","_","G3","_"],
  lead:["G4","_","_","E4","_","D4","_","_","C4","_","D4","E4","G4","_","_","_",
        "A4","_","_","G4","_","E4","_","D4","E4","_","C4","_","_","_","_","_"]},
 {id:"soda",title:"SODA SUMMER",sub:"BUBBLE POP",c:["#3fa66b","#2b7d4e","#f5d13d"],bpm:132,
  bass:["C4","_","G3","_","A3","_","E3","_","F3","_","C4","_","G3","_","G3","_"],
  lead:["E5","_","D5","C5","_","G4","_","_","A4","_","C5","_","D5","_","_","_",
        "E5","_","D5","C5","_","G4","_","A4","B4","_","C5","_","_","_","_","_"]},
 {id:"rain",title:"RAINY LO-FI",sub:"WINDOW TAPES",c:["#4d7ea8","#35597a","#b9d6ea"],bpm:76,
  bass:["F3","_","_","_","E3","_","_","_","D3","_","_","_","E3","_","_","_"],
  lead:["A4","_","_","C5","_","_","B4","_","_","G4","_","_","E4","_","_","_",
        "F4","_","_","A4","_","_","G4","_","_","E4","_","_","_","_","_","_"]}
];
/* ================= DOM ================= */
const $=id=>document.getElementById(id);
const stack=$("stack"),deckTape=$("deckTape"),display=$("display"),
trackName=$("trackName"),clockEl=$("clock"),led=$("led"),
btnPlay=$("btnPlay"),btnStop=$("btnStop"),btnEject=$("btnEject"),
spkL=$("spkL"),spkR=$("spkR"),vu=$("vu"),knob=$("knob");
/* 灰尘粒子 */
for(let i=0;i<26;i++){const d=document.createElement("i");
d.style.left=Math.random()*100+"%";d.style.top=(30+Math.random()*70)+"%";
d.style.animationDuration=(9+Math.random()*14)+"s";
d.style.animationDelay=(-Math.random()*20)+"s";
d.style.opacity=.2+Math.random()*.5;$("dust").appendChild(d);}
/* VU 柱 */
const VU_BARS=9,vuBars=[];
for(let i=0;i<VU_BARS;i++){const b=document.createElement("i");vu.appendChild(b);vuBars.push(b);}
/* 生成磁带 DOM */
function tapeHTML(t){return `<div class="tape-shell" style="--tc1:${t.c[0]};--tc2:${t.c[1]};--tc3:${t.c[2]}">
 <div class="tape-label"><div class="stripe"></div><div class="ttl">${t.title}</div><div class="sub">${t.sub}</div></div>
 <div class="reel-win"><div class="reel"></div><div class="tape-ribbon"></div><div class="reel"></div></div></div>`;}
TAPES.forEach(t=>{
  const el=document.createElement("div");
  el.className="tape";el.dataset.id=t.id;el.innerHTML=tapeHTML(t);
  el.title="点击插入 "+t.title;
  el.addEventListener("click",()=>insertTape(t,el));
  stack.appendChild(el);t.el=el;
});
/* ================= WebAudio 芯片音乐引擎 ================= */
let AC=null,master,analyser,noiseBuf;
function audioInit(){
  if(AC)return;
  AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain();master.gain.value=.8;
  analyser=AC.createAnalyser();analyser.fftSize=64;
  master.connect(analyser);analyser.connect(AC.destination);
  noiseBuf=AC.createBuffer(1,AC.sampleRate*.5,AC.sampleRate);
  const d=noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
}
function blip(freq,t0,dur,type,vol){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+.012);
  g.gain.exponentialRampToValueAtTime(.001,t0+dur);
  o.connect(g);g.connect(master);o.start(t0);o.stop(t0+dur+.05);
}
function hat(t0,vol){
  const s=AC.createBufferSource();s.buffer=noiseBuf;
  const f=AC.createBiquadFilter();f.type="highpass";f.frequency.value=6500;
  const g=AC.createGain();g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(.001,t0+.06);
  s.connect(f);f.connect(g);g.connect(master);s.start(t0);s.stop(t0+.08);
}
function kick(t0,vol){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type="sine";o.frequency.setValueAtTime(120,t0);
  o.frequency.exponentialRampToValueAtTime(40,t0+.12);
  g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.16);
  o.connect(g);g.connect(master);o.start(t0);o.stop(t0+.2);
}
/* ================= 播放状态机 ================= */
let current=null,playing=false,seqTimer=null,step=0,nextT=0,elapsed=0,elapsedTimer=null;
const LOOKAHEAD=.25,TICK=90;
function schedStep(tape,i,t){
  const s16=t/16;
  const b=tape.bass[i%16],l=tape.lead[i];
  if(b&&b!=="_")blip(N[b]||0,t,s16*1.8,"triangle",.30);
  if(l&&l!=="_")blip(N[l]||0,t,s16*1.6,"square",.13);
  if(i%4===0){kick(t,.5);thump();}
  if(i%2===1)hat(t,.12);
}
function scheduler(){
  if(!playing||!current)return;
  const s16=60/current.bpm/4;
  while(nextT<AC.currentTime+LOOKAHEAD){
    schedStep(current,step,nextT);
    step=(step+1)%current.lead.length;nextT+=s16;
  }
  seqTimer=setTimeout(scheduler,TICK);
}
function startMusic(){
  audioInit();AC.resume();
  playing=true;step=0;nextT=AC.currentTime+.08;elapsed=0;
  scheduler();
  elapsedTimer=setInterval(()=>{elapsed+=.25;
    clockEl.textContent=fmt(elapsed);},250);
  display.classList.add("playing");led.classList.add("on");
  deckTape.classList.add("playing");
  btnPlay.disabled=true;btnStop.disabled=false;
}
function stopMusic(){
  playing=false;clearTimeout(seqTimer);clearInterval(elapsedTimer);
  display.classList.remove("playing");led.classList.remove("on");
  deckTape.classList.remove("playing");
  vuBars.forEach(b=>b.style.height="8%");
  btnPlay.disabled=!current;btnStop.disabled=true;
}
function fmt(s){s=Math.floor(s);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
/* ================= 插入 / 弹出 ================= */
let busy=false;
function flyClone(fromEl,toRect,done){
  const r=fromEl.getBoundingClientRect();
  const c=fromEl.cloneNode(true);
  c.classList.add("fly");c.classList.remove("playing");
  c.style.left=r.left+"px";c.style.top=r.top+"px";
  c.style.width=r.width+"px";c.style.height=r.height+"px";
  document.body.appendChild(c);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    c.style.left=toRect.left+"px";c.style.top=toRect.top+"px";
    c.style.width=toRect.width+"px";c.style.height=toRect.height+"px";
    c.style.transform="rotate(0deg)";
  }));
  setTimeout(()=>{c.remove();done&&done();},680);
}
function insertTape(t,el){
  if(busy)return;
  if(current&&current.id===t.id)return;
  if(current){ /* 已有磁带:先弹出再插入(ejectTape 内部会管理 busy) */
    ejectTape(()=>insertTape(t,el));
    return;
  }
  busy=true;
  stopMusic();
  const deckRect=$("deck").getBoundingClientRect();
  const target={left:deckRect.left+deckRect.width*.5-el.getBoundingClientRect().width*.46,
    top:deckRect.top+deckRect.height*.42,
    width:el.getBoundingClientRect().width*.92,
    height:el.getBoundingClientRect().height*.92};
  el.style.visibility="hidden";
  flyClone(el,target,()=>{
    const h=document.querySelector(".hint");if(h)h.style.display="none";
    current=t;
    deckTape.innerHTML=tapeHTML(t);
    deckTape.style.display="block";
    trackName.textContent="♪ "+t.title+" — "+t.sub+" ♪";
    clockEl.textContent="0:00";
    btnPlay.disabled=false;btnEject.disabled=false;
    busy=false;
    startMusic(); /* 插入即播 */
  });
}
function ejectTape(cb){
  if(busy||!current)return;
  busy=true;stopMusic();
  const t=current,el=t.el;
  const r=deckTape.getBoundingClientRect();
  deckTape.style.display="none";
  const ghost=document.createElement("div");
  ghost.className="tape";ghost.innerHTML=tapeHTML(t);
  ghost.style.visibility="hidden";document.body.appendChild(ghost);
  const tr=el.getBoundingClientRect();
  ghost.style.cssText+=`;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;visibility:visible`;
  ghost.classList.add("fly");
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ghost.style.left=tr.left+"px";ghost.style.top=tr.top+"px";
    ghost.style.width=tr.width+"px";ghost.style.height=tr.height+"px";
    ghost.style.transform="rotate(-2deg)";
  }));
  setTimeout(()=>{
    ghost.remove();el.style.visibility="visible";
    current=null;trackName.textContent="— NO TAPE —";
    clockEl.textContent="0:00";
    btnPlay.disabled=true;btnStop.disabled=true;btnEject.disabled=true;
    busy=false;cb&&cb();
  },680);
}
btnPlay.addEventListener("click",()=>{if(current&&!playing)startMusic();});
btnStop.addEventListener("click",stopMusic);
btnEject.addEventListener("click",()=>ejectTape());
deckTape.addEventListener("click",()=>ejectTape()); /* 点仓内磁带也可拔出 */
/* ================= VU 表 + 喇叭震动 ================= */
const fft=new Uint8Array(32);
function thump(){[spkL,spkR].forEach(s=>{s.classList.remove("thump");void s.offsetWidth;s.classList.add("thump");});}
(function vuLoop(){
  requestAnimationFrame(vuLoop);
  if(!playing||!analyser)return;
  analyser.getByteFrequencyData(fft);
  vuBars.forEach((b,i)=>{
    const v=fft[Math.floor(i*2.4)]/255;
    b.style.height=(8+v*92)+"%";
    b.style.background=v>.75?"linear-gradient(180deg,#ff5040,#c03020)":
      v>.45?"linear-gradient(180deg,#ffd23d,#d8991f)":"linear-gradient(180deg,#3fd24a,#1f8a2c)";
  });
})();
/* ================= 音量旋钮(拖拽) ================= */
let vol=.8,dragging=false,startY=0,startVol=.8;
knob.addEventListener("pointerdown",e=>{dragging=true;startY=e.clientY;startVol=vol;knob.setPointerCapture(e.pointerId);});
knob.addEventListener("pointermove",e=>{
  if(!dragging)return;
  vol=Math.min(1,Math.max(0,startVol+(startY-e.clientY)/160));
  knob.style.setProperty("--rot",(-120+vol*240)+"deg");
  if(master)master.gain.value=vol*vol;
});
knob.addEventListener("pointerup",()=>dragging=false);
/* ================= 舞台自适应缩放(防止任何窗口尺寸下遮挡) ================= */
const stageEl=document.querySelector(".stage");
function fitStage(){
  stageEl.style.transform="none";
  const w=stageEl.offsetWidth,h=stageEl.offsetHeight;
  const s=Math.min(1,(innerWidth*.92)/w,(innerHeight*.72)/h);
  stageEl.style.transform=`translateY(2vmin) scale(${s})`;
}
addEventListener("resize",fitStage);
fitStage();setTimeout(fitStage,60);
</script>
